name: Minecraft_No_Error_2026

on:
  workflow_dispatch:

# 1. إعطاء الصلاحية للبوت لكي يستطيع عمل git push
permissions:
  contents: write

# 2. حل تحذير Node.js 20 المزعج
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Restore World
        run: |
          if [ -f "world_backup.zip" ]; then
            unzip -o world_backup.zip || echo "No backup"
          fi

      - name: Run Server & Ngrok
        env:
          NGROK_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          # تحميل Ngrok
          curl -L https://bin.equinox.io/c/bPR9B2hS3AD/ngrok-v3-stable-linux-amd64.tgz -o ngrok.tgz
          tar -xzf ngrok.tgz
          chmod +x ngrok
          ./ngrok config add-authtoken $NGROK_TOKEN
          ./ngrok tcp 25565 &

          # تحميل السيرفر
          curl -L https://api.purpurmc.org/v2/purpur/1.20.1/latest/download -o server.jar
          echo "eula=true" > eula.txt
          
          # إعدادات السيرفر
          echo "online-mode=false" > server.properties
          echo "motd=\u00A7c\u00A7lhi in my server" >> server.properties

          mkdir -p plugins
          # تحميل المودات (تم تصحيح رابط ViaVersion)
          curl -L https://github.com/EssentialsX/Essentials/releases/download/2.20.1/EssentialsX-2.20.1.jar -o plugins/EssentialsX.jar
          curl -L https://github.com/LS-Core/Lifesteal-Core/releases/latest/download/Lifesteal-Core.jar -o plugins/Lifesteal.jar
          curl -L https://github.com/ViaVersion/ViaVersion/releases/download/4.10.0/ViaVersion-4.10.0.jar -o plugins/ViaVersion.jar

          # تشغيل السيرفر (تم تقليل الرام إلى 6G لتجنب انهيار السيرفر)
          echo "🚀 السيرفر يقلع الآن... انتظر الرابط"
          java -Xmx6G -Xms6G -jar server.jar nogui

      - name: Save World
        if: always()
        run: |
          zip -r world_backup.zip world world_nether world_the_end plugins server.properties
          git config --global user.name "MC-Bot"
          git config --global user.email "bot@github.com"
          git add world_backup.zip
          git commit -m "Save World Backup" || echo "No change"
          git push
          git push
